server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always
spring:
  application:
    name: api-person-control-financial

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/financial?useTimezone=true&serverTimezone=UTC
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false

  cache:
    type: redis
    redis:
      time-to-live: 60000
      cache-null-values: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379


spring-doc:
  paths-to-match: /api/**/v1/**
  swagger-ui:
    use-root-path: true

logging:
  level:
    org.springframework.cache: debug

