spring:
  application:
    name: api-person-control-financial
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/financial?useTimezone=true&serverTimezone=UTC
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false

  logging:
    level:
      com.masprog: DEBUG
      # root: WARN  # Descomente se quiser definir o nível global

spring-doc:
  paths-to-match: /api/**/v1/**
  swagger-ui:
    use-root-path: true
