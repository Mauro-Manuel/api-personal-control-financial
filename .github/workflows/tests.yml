name: CI - Tests API

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Dar permissão ao Maven wrapper
        run: chmod +x mvnw

      - name: Habilitar suporte ao Docker para Testcontainers
        run: |
          sudo systemctl enable docker
          sudo systemctl start docker
          sudo usermod -aG docker $USER
          docker ps

      - name: Verificar Docker
        run: docker run hello-world

      - name: Instalar dependências e rodar testes
        run: ./mvnw clean verify -Pci

      - name: Gerar relatório JaCoCo
        run: ./mvnw jacoco:report